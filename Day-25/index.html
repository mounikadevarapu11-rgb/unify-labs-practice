<!DOCTYPE html>
<html>
<head>
  <title>Mass Updates Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<table>

      <th>Name</th>

      <th>Price</th>
      <th>Stock</th>
      <th>Featured</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
